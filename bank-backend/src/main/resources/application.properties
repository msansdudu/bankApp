spring.config.import=optional:file:src/main/resources/application-secret.properties
spring.application.name=bank-backend
spring.datasource.url=${DB_URL}
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

app.jwt.secret=${JWT_SECRET:default_very_long_secret_key}
app.jwt.expirationMs=86400000

spring.jpa.hibernate.ddl-auto=update

# показывать SQL-запросы в консоли
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect